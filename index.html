        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            padding: clamp(20px, 3vw, 40px) clamp(12px, 2vw, 20px);
            min-width: 0;
            overflow-x: hidden;
        }

        .quick-nav {
            max-width: 1600px;
            margin: 0 auto clamp(16px, 2.4vw, 26px);
            padding: clamp(12px, 2vw, 16px);
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background:
                radial-gradient(circle at 10% -40%, rgba(255, 255, 255, 0.18), transparent 48%),
                rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(8px);
            position: sticky;
            top: 8px;
            z-index: 20;
            box-shadow: 0 12px 26px rgba(0, 0, 0, 0.25);
        }

        .quick-nav-head {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .quick-nav-title {
            font-size: 12px;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            font-weight: 700;
            color: #cfcfcf;
        }

        .quick-nav-tip {
            font-size: 11px;
            color: #8b8b8b;
        }

        .quick-nav-list {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 2px 1px 2px;
            scrollbar-width: none;
            -ms-overflow-style: none;
            scroll-snap-type: x proximity;
            -webkit-overflow-scrolling: touch;
            mask-image: linear-gradient(90deg, transparent 0, #000 14px, #000 calc(100% - 14px), transparent 100%);
        }

        .quick-nav-item {
            --chip-color: #f2f2f2;
            --chip-bg: rgba(255, 255, 255, 0.06);
            --chip-border: rgba(255, 255, 255, 0.22);
            --chip-glow: rgba(255, 255, 255, 0.2);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;
            padding: 8px 13px;
            border-radius: 999px;
            border: 1px solid var(--chip-border);
            color: var(--chip-color);
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 0.3px;
            font-weight: 700;
            background: var(--chip-bg);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
            transition: transform 0.18s, box-shadow 0.18s, filter 0.18s;
            scroll-snap-align: start;
            white-space: nowrap;
        }

        .quick-nav-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px var(--chip-glow), inset 0 0 0 1px rgba(255, 255, 255, 0.08);
            filter: saturate(1.08);
        }

        .quick-nav-item:focus-visible {
            outline: 2px solid var(--chip-color);
            outline-offset: 2px;
        }

        .quick-nav-list::-webkit-scrollbar {
            display: none;

        .header {
            text-align: center;

            -webkit-text-fill-color: transparent;

        .card {

            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.03);
            display: block;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
        }

        .card:visited {
            color: inherit;
        }

        .card::before {
            content: '';

            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            border-radius: 16px 16px 0 0;
        }

<body>

    <nav class="quick-nav" aria-label="快速跳转目录">
        <div class="quick-nav-head">
            <span class="quick-nav-title">快速跳转目录</span>

    <div class="header">
        <h1>全 人 格 图 鉴</h1>
        <p>27 种人格类型 · 一图尽览</p>
    </div>

    <div class="grid" id="type-grid"></div>

    <div class="footer">
        全人格图鉴 · 共 27 种人格类型 · 一图尽览
    </div>

    <script>
        let equalizeResizeTimer = null;
        let equalizeListenersBound = false;

        function normalizeCardHeights() {
            const grid = document.getElementById('type-grid');
            if (!grid) {
                return;
            }

            const cards = Array.from(grid.querySelectorAll('.card'));
            if (!cards.length) {
                return;
            }

            cards.forEach((card) => {
                card.style.height = 'auto';
            });

            let maxHeight = 0;
            cards.forEach((card) => {
                maxHeight = Math.max(maxHeight, card.getBoundingClientRect().height);
            });

            const normalizedHeight = `${Math.ceil(maxHeight)}px`;
            cards.forEach((card) => {
                card.style.height = normalizedHeight;
            });
        }

        function scheduleNormalizeCardHeights() {
            window.requestAnimationFrame(() => {
                normalizeCardHeights();
            });
        }

        function bindEqualizeListeners() {
            if (equalizeListenersBound) {
                return;
            }

            equalizeListenersBound = true;

            window.addEventListener('resize', () => {
                window.clearTimeout(equalizeResizeTimer);
                equalizeResizeTimer = window.setTimeout(() => {
                    scheduleNormalizeCardHeights();
                }, 120);
            }, {
                passive: true
            });

            window.addEventListener('orientationchange', () => {
                scheduleNormalizeCardHeights();
            }, {
                passive: true
            });

            if (document.fonts && document.fonts.ready) {
                document.fonts.ready.then(() => {
                    scheduleNormalizeCardHeights();
                }).catch(() => {
                    // Ignore font-loading failures and keep current measured heights.
                });
            }
        }

        async function syncTypeLibrary() {
            try {
                const response = await fetch('./TYPE_LIBRARY.json');
                if (!response.ok) {
                    throw new Error('Failed to load TYPE_LIBRARY.json');
                }

                const library = await response.json();
                const grid = document.getElementById('type-grid');
                const quickNavList = document.getElementById('quick-nav-list');
                if (!grid) {
                    return;
                }

                grid.innerHTML = '';
                if (quickNavList) {
                    quickNavList.innerHTML = '';
                }

                const toThemeClass = (code) => code.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
                const toRgba = (colorString, alpha) => {
                    const values = (colorString || '').match(/\d+/g);
                    if (!values || values.length < 3) {
                        return `rgba(242, 242, 242, ${alpha})`;
                    }

                    const [r, g, b] = values;
                    return `rgba(${r}, ${g}, ${b}, ${alpha})`;
                };

                Object.values(library).forEach((profile) => {
                    const slug = toThemeClass(profile.code || 'type');
                    const typeCode = profile.code || slug.toUpperCase();
                    const typeLabel = profile.cn || typeCode;
                    const card = document.createElement('a');
                    card.className = `card card-${slug}`;
                    card.href = `./types/${slug}.html`;
                    card.setAttribute('aria-label', `查看 ${profile.code || ''} 详情`);

                    const codeEl = document.createElement('div');
                    codeEl.className = 'card-code';
                    codeEl.textContent = typeCode;

                    const cnEl = document.createElement('div');
                    cnEl.className = 'card-cn';
                    cnEl.textContent = profile.cn || '';

                    const introEl = document.createElement('div');
                    introEl.className = 'card-intro';
                    introEl.textContent = profile.intro || '';

                    const descEl = document.createElement('div');
                    descEl.className = 'card-desc';
                    descEl.textContent = profile.desc || '';

                    const linkHintEl = document.createElement('div');
                    linkHintEl.className = 'card-link-hint';
                    linkHintEl.textContent = '点击查看规则详情';

                    card.appendChild(codeEl);
                    card.appendChild(cnEl);
                    card.appendChild(introEl);
                    card.appendChild(descEl);
                    card.appendChild(linkHintEl);
                    grid.appendChild(card);

                    const themeColor = window.getComputedStyle(codeEl).color || 'rgb(242, 242, 242)';

                    if (quickNavList) {
                        const quickLinkEl = document.createElement('a');
                        quickLinkEl.className = 'quick-nav-item';
                        quickLinkEl.href = `./types/${slug}.html`;
                        quickLinkEl.textContent = typeLabel;
                        quickLinkEl.title = `${typeCode} ${profile.cn || ''}`.trim();
                        quickLinkEl.setAttribute('aria-label', `快速跳转到 ${typeCode} ${profile.cn || ''} 详情`);
                        quickLinkEl.style.setProperty('--chip-color', themeColor);
                        quickLinkEl.style.setProperty('--chip-bg', toRgba(themeColor, 0.2));
                        quickLinkEl.style.setProperty('--chip-border', toRgba(themeColor, 0.56));
                        quickLinkEl.style.setProperty('--chip-glow', toRgba(themeColor, 0.34));
                        quickNavList.appendChild(quickLinkEl);
                    }
                });

                const footer = document.querySelector('.footer');
                if (footer) {
                    const total = Object.keys(library).length;
                    footer.textContent = `全人格图鉴 · 共 ${total} 种人格类型 · 一图尽览`;
                }

                scheduleNormalizeCardHeights();
            } catch (error) {
                console.warn('TYPE_LIBRARY 同步失败，继续使用页面内置文案。', error);
            }
        }

        bindEqualizeListeners();
        syncTypeLibrary();
    </script>
